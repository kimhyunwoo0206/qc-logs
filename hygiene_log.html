<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>위생점검일지 — ㈜위드프레쉬</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; font-size: 14px; background: #f0f2f5; color: #222; }

    .container { max-width: 620px; margin: 0 auto; padding: 14px 14px 40px; }

    .page-header { text-align: center; padding: 18px 0 14px; }
    .page-header h1 { font-size: 19px; font-weight: bold; color: #1a3a5c; letter-spacing: 1px; }
    .page-header p { font-size: 12px; color: #888; margin-top: 3px; }

    .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 5px rgba(0,0,0,.08); }
    .section-title { font-size: 13px; font-weight: bold; color: #1a3a5c; border-left: 4px solid #1a3a5c; padding-left: 8px; margin-bottom: 14px; }

    /* 기본정보 */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .field label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; }
    .field input, .field select { width: 100%; padding: 10px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; }
    .field input:focus, .field select:focus { border-color: #1a3a5c; outline: none; }
    .field.full { grid-column: 1/-1; }

    /* 주기 탭 */
    .period-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .period-tab { flex: 1; min-width: 70px; padding: 10px 6px; border: 2px solid #ddd; border-radius: 8px; background: #fff; font-size: 13px; font-weight: bold; text-align: center; cursor: pointer; font-family: inherit; color: #888; transition: all .15s; }
    .period-tab.active { border-color: #1a3a5c; background: #1a3a5c; color: #fff; }

    /* 점검 섹션 */
    .check-section { margin-bottom: 16px; }
    .check-section-title { font-size: 12px; font-weight: bold; color: #fff; background: #2e5f8a; padding: 7px 12px; border-radius: 6px 6px 0 0; }
    .check-list { border: 1.5px solid #ddd; border-top: none; border-radius: 0 0 6px 6px; overflow: hidden; }

    .check-item { padding: 11px 12px; border-bottom: 1px solid #f0f0f0; }
    .check-item:last-child { border-bottom: none; }
    .check-item.has-alert { background: #fff8f8; }

    .check-row { display: flex; align-items: flex-start; gap: 10px; }
    .check-label { flex: 1; font-size: 13px; line-height: 1.5; color: #333; }
    .yn-btns { display: flex; gap: 5px; flex-shrink: 0; }
    .yn-btn { width: 46px; padding: 7px 0; border: 1.5px solid #ddd; border-radius: 6px; font-size: 13px; font-weight: bold; text-align: center; cursor: pointer; background: #fff; font-family: inherit; color: #888; }
    .yn-btn.yes.active { background: #e8f5e9; border-color: #2e7d32; color: #2e7d32; }
    .yn-btn.no.active { background: #ffebee; border-color: #c62828; color: #c62828; }

    /* 숫자 입력이 있는 항목 */
    .num-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .num-label { font-size: 12px; color: #555; white-space: nowrap; }
    .num-input { width: 80px; padding: 8px; border: 1.5px solid #ddd; border-radius: 6px; font-size: 14px; text-align: center; font-family: inherit; -moz-appearance: textfield; }
    .num-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .num-input:focus { border-color: #1a3a5c; outline: none; }
    .num-unit { font-size: 12px; color: #888; }

    /* 이상 조치 */
    .alert-input { margin-top: 8px; }
    .alert-input label { font-size: 11px; color: #c62828; display: block; margin-bottom: 3px; }
    .alert-input textarea { width: 100%; padding: 8px; border: 1.5px solid #ffcdd2; border-radius: 6px; font-size: 13px; font-family: inherit; resize: vertical; min-height: 50px; background: #fff8f8; }

    /* 특이사항 */
    .notes-area textarea { width: 100%; padding: 10px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 13px; font-family: inherit; resize: vertical; min-height: 70px; }

    /* 저장 버튼 */
    .btn-save { width: 100%; padding: 16px; background: #1a3a5c; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; font-family: inherit; letter-spacing: 1px; margin-top: 4px; }
    .btn-save:active { background: #0f2540; }
    .btn-save:disabled { background: #aab; }

    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); white-space: nowrap; background: #333; color: #fff; padding: 12px 22px; border-radius: 24px; font-size: 14px; opacity: 0; pointer-events: none; transition: opacity .3s; z-index: 999; }
    .toast.show { opacity: 1; }
    .toast.success { background: #2e7d32; }
    .toast.error { background: #c62828; }

    @media print {
      body { background: #fff; font-size: 9pt; }
      .container { max-width: 100%; padding: 0; }
      .card { box-shadow: none; border: 1px solid #ccc; border-radius: 0; margin-bottom: 6px; padding: 8px; }
      .btn-save, .toast, .period-tabs { display: none !important; }
      .check-section { page-break-inside: avoid; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="page-header">
    <h1>일반위생관리 및 공정점검표</h1>
    <p>㈜위드프레쉬</p>
  </div>

  <!-- 기본정보 -->
  <div class="card">
    <div class="section-title">■ 기본정보</div>
    <div class="info-grid">
      <div class="field full">
        <label>점검일자</label>
        <input type="date" id="date">
      </div>
      <div class="field">
        <label>점검자</label>
        <select id="inspector">
          <option value="">선택하세요</option>
          <option value="전혜진 계장">전혜진 계장</option>
        </select>
      </div>
      <div class="field">
        <label>확인자</label>
        <select id="confirmer">
          <option value="">선택하세요</option>
          <option value="김현우 부장">김현우 부장</option>
        </select>
      </div>
    </div>
  </div>

  <!-- 주기 선택 -->
  <div class="card">
    <div class="section-title">■ 점검 주기</div>
    <div class="period-tabs">
      <button class="period-tab active" data-period="daily" onclick="switchPeriod('daily')">일일점검</button>
      <button class="period-tab" data-period="weekly" onclick="switchPeriod('weekly')">주간점검</button>
      <button class="period-tab" data-period="monthly" onclick="switchPeriod('monthly')">월간점검</button>
      <button class="period-tab" data-period="quarterly" onclick="switchPeriod('quarterly')">분기점검</button>
      <button class="period-tab" data-period="annual" onclick="switchPeriod('annual')">연간점검</button>
    </div>

    <!-- 일일점검 -->
    <div id="section-daily">

      <!-- 작업전 -->
      <div class="check-section">
        <div class="check-section-title">▶ 작업 전</div>
        <div class="check-list" id="list-before"></div>
      </div>

      <!-- 작업중 -->
      <div class="check-section">
        <div class="check-section-title">▶ 작업 중</div>
        <div class="check-list" id="list-during"></div>
      </div>

      <!-- 작업후 -->
      <div class="check-section">
        <div class="check-section-title">▶ 작업 후</div>
        <div class="check-list" id="list-after"></div>
      </div>
    </div>

    <!-- 주간점검 -->
    <div id="section-weekly" style="display:none">
      <div class="check-section">
        <div class="check-section-title">▶ 주간 점검항목</div>
        <div class="check-list" id="list-weekly"></div>
      </div>
    </div>

    <!-- 월간점검 -->
    <div id="section-monthly" style="display:none">
      <div class="check-section">
        <div class="check-section-title">▶ 월간 점검항목</div>
        <div class="check-list" id="list-monthly"></div>
      </div>
    </div>

    <!-- 분기점검 -->
    <div id="section-quarterly" style="display:none">
      <div class="check-section">
        <div class="check-section-title">▶ 분기 점검항목</div>
        <div class="check-list" id="list-quarterly"></div>
      </div>
    </div>

    <!-- 연간점검 -->
    <div id="section-annual" style="display:none">
      <div class="check-section">
        <div class="check-section-title">▶ 연간 점검항목</div>
        <div class="check-list" id="list-annual"></div>
      </div>
    </div>
  </div>

  <!-- 특이사항 -->
  <div class="card">
    <div class="section-title">■ 특이사항 및 개선조치</div>
    <div class="notes-area">
      <textarea id="notes" placeholder="특이사항, 기준이탈 내용 및 개선조치 결과를 입력하세요"></textarea>
    </div>
  </div>

  <button class="btn-save" id="btn-save" onclick="saveRecord()">저 장 하 기</button>
</div>
<div class="toast" id="toast"></div>

<script>
// =============================================
const FIREBASE_URL = 'https://withfresh-haccp-default-rtdb.asia-southeast1.firebasedatabase.app';
// =============================================

// ── 점검 항목 데이터 ──────────────────────────

const ITEMS = {
  before: [
    { id: 'b1', category: '개인위생', text: '위생복장과 외출복장이 구분하여 보관되고 있기?' },
    { id: 'b2', category: '개인위생', text: '종사자의 건강상태가 양호하고 개인장신구 등을 소지하지 않으며, 청결한 위생복장을 착용하고 작업하고 있는가?' },
    { id: 'b3', category: '개인위생', text: '위생설비(손세척기 등) 중 이상이 있는 것이 없으며, 종사자는 위생처리를 하고 입실하는가?' },
    { id: 'b4', category: '설비',    text: '파손되거나 고장 난 제조설비가 없는가?' },

    { id: 'b6', category: '입고보관', text: '냉동창고의 온도가 적절히 관리되고 있는가? (냉장:0~10℃, 냉동:-18℃이하) [오전9시~10시]' },

    { id: 'd1',  category: '위생관리', text: '청결 구역 작업과 일반구역작업이 분리되어 있으며 오염되지 않도록 관리되고 있는가?' },
    { id: 'd2',  category: '위생관리', text: '작업 중 손, 장갑, 작업도구 소독을 적절히 하고 있다.' },
    { id: 'd3',  category: '위생관리', text: '작업장 및 화장실 출입 시 손 및 신발을 세척 또는 소독하고 있다.' },
    { id: 'd4',  category: '위생관리', text: '작업 중 흡연, 음식을 섭취, 껌 씹는 행위를 하지 않는다.' },
    { id: 'd5',  category: '해동',     text: '해동실은 청결하고 해동상태는 적합한가? (유수해동, 10~15분이내)',
      extra: { type: 'number', id: 'thaw_time', label: '해동시간', unit: 'min', placeholder: '0' } },
    { id: 'd6',  category: '공정관리', text: '전처리 상태는 적합한가?' },
    { id: 'd7',  category: '공정관리', text: '공정품 절단상태는 적합한가?' },
    { id: 'd8',  category: '공정관리', text: '동결상태는 적합한가? (동결온도 -30℃ 이하, 동결시간 4시간이상)' },
    { id: 'd9',  category: '공정관리', text: '계량 및 충진 상태는 적합한가?' },
    { id: 'd10', category: '공정관리', text: '포장재 상태는 적합한가?' },

      extra: { type: 'temps', fields: [
        { id: 'temp_clean',   label: '청결구역' },
        { id: 'temp_gen1',    label: '일반구역(제1전처리실)' },
        { id: 'temp_thaw',    label: '일반구역(해동실)' },
        { id: 'temp_simple',  label: '단순수산물가공구역' },
      ]}
    },
    { id: 'd12', category: '공정관리', text: '포장기 청결상태는 적합한가?' },
    { id: 'd13', category: '공정관리', text: '내포장 용기 보관상태는 적절한가?' },
    { id: 'd14', category: '공정관리', text: '바닥에 이물이 있거나, 제품이 방치되어 있지는 않은가?' },
    { id: 'd15', category: '공정관리', text: '완제품의 포장 상태가 양호한가?' },
    { id: 'd16', category: '공정관리', text: '모니터링장비(타이머 등)는 사용전후 세척소독을 실시하고 있는가?' },
    { id: 'd17', category: '제품관리', text: '냉동창고와 소스냉장고 온도가 적절히 관리되고 있는가? [오후1시~2시]' },
    { id: 'd18', category: '폐기물',   text: '작업장 주변의 음식물폐기물은 잘 정리되어 보관되어지고 있고, 주기적으로 반출되고 있는가?' },
  ],
  after: [
    { id: 'a1', category: '청소소독', text: '작업장 바닥, 배수로, 위생시설, 제조설비(식품과 직접 닿는 부분)의 청소·소독 상태는 양호한가?' },
    { id: 'a2', category: '설비',     text: '파손되거나 고장 난 제조설비가 없는가?' },
    { id: 'a3', category: '제품관리', text: '냉동창고와 소스냉장고 온도가 적절히 관리되고 있는가? [오후5시~5시30분]' },
  ],
  weekly: [
    { id: 'w1',  category: '청소소독', text: '작업장 천장, 벽, 바닥, 제조설비(제품과 직접 닿지 않는 부분)의 청소·소독을 실시하였으며, 청소·소독 상태는 양호하다.' },
    { id: 'w2',  category: '청소소독', text: '위생복장 등은 세탁 또는 세척·소독을 실시하였다.' },
    { id: 'w3',  category: '청소소독', text: '창고 내부 청소 상태는 양호하다.' },
    { id: 'w4',  category: '청소소독', text: '환풍기 필터, 방충망 등은 세척 되었는가?' },
    { id: 'w5',  category: '청소소독', text: '작업도구(제품과 직접 접촉하는)에 대한 세척 소독 상태는 양호한가?' },
    { id: 'w6',  category: '작업장',   text: '작업장 내 조명등의 고장이나 보호 커버가 파손되지 않았는가?' },
    { id: 'w7',  category: '작업장',   text: '작업장 내 문, 창문, 벽, 바닥 등은 파손되지 않았는가?' },
    { id: 'w8',  category: '작업장',   text: '작업장 내 탈의실, 화장실 등 설비는 파손되지 않았는가?' },
    { id: 'w9',  category: '작업장',   text: '위생장비 작동상태는 적절한가?' },
    { id: 'w10', category: '장비',     text: '제조설비는 녹이 나거나 작동하지 않는 제조설비는 없는가?' },
    { id: 'w11', category: '보관',     text: '보관창고는 청결하고 보관상태는 적절한가?' },
  ],
  monthly: [
    { id: 'm1', category: '청소',  text: '작업장 전체 청소·소독 상태는 양호한가?' },
    { id: 'm2', category: '교육',  text: '종업원 위생교육을 실시하였는가?' },
    { id: 'm3', category: '검증',  text: '중요관리공정(CCP) 검증점검표를 작성하였는가?' },
  ],
  quarterly: [
    { id: 'q1', category: '검사',  text: '완제품에 대한 품질검사(자가품질검사)를 실시하였다.' },
  ],
  annual: [
    { id: 'an1', category: '점검검사', text: '저울, 타이머, 온도계는 검·교정하였는가?' },
    { id: 'an2', category: '점검검사', text: '금속검출기에 대한 정기점검을 실시하였는가?' },
    { id: 'an3', category: '점검검사', text: '정기검증(실시상황평가표 활용)을 실시하였는가?' },
  ],
};

let currentPeriod = 'daily';

// ── 오늘 날짜 기본값 ──
document.getElementById('date').value = new Date().toISOString().slice(0,10);

// ── 주기 전환 ──
function switchPeriod(p) {
  currentPeriod = p;
  document.querySelectorAll('.period-tab').forEach(t => t.classList.toggle('active', t.dataset.period === p));
  ['daily','weekly','monthly','quarterly','annual'].forEach(s => {
    document.getElementById(`section-${s}`).style.display = s === p ? 'block' : 'none';
  });
}

// ── 항목 렌더링 ──
function renderList(containerId, items) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = '';

  let lastCat = '';
  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'check-item';
    div.id = `item-${item.id}`;

    // 카테고리 구분선
    const catLabel = lastCat !== item.category
      ? `<div style="font-size:11px;color:#888;margin-bottom:4px;">[${item.category}]</div>` : '';
    lastCat = item.category;

    // 추가 입력 (숫자/온도)
    let extraHtml = '';
    if (item.extra) {
      if (item.extra.type === 'number') {
        extraHtml = `
          <div class="num-row">
            <span class="num-label">${item.extra.label}:</span>
            <input class="num-input" type="number" id="${item.extra.id}" placeholder="${item.extra.placeholder || '0'}">
            <span class="num-unit">${item.extra.unit}</span>
          </div>`;
      } else if (item.extra.type === 'temps') {
        extraHtml = '<div class="num-row" style="flex-wrap:wrap;gap:6px;">' +
          item.extra.fields.map(f =>
            `<div style="display:flex;align-items:center;gap:4px;width:100%;">
               <span class="num-label" style="min-width:140px;">${f.label}:</span>
               <input class="num-input" type="number" step="0.1" id="${f.id}" placeholder="0">
               <span class="num-unit">℃</span>
             </div>`
          ).join('') + '</div>';
      }
    }

    div.innerHTML = `
      ${catLabel}
      <div class="check-row">
        <span class="check-label">${item.text}</span>
        <div class="yn-btns">
          <button class="yn-btn yes" id="yes-${item.id}" onclick="setYN('${item.id}', true)">예</button>
          <button class="yn-btn no"  id="no-${item.id}"  onclick="setYN('${item.id}', false)">아니오</button>
        </div>
      </div>
      ${extraHtml}
      <div class="alert-input" id="alert-${item.id}" style="display:none">
        <label>⚠ 조치사항</label>
        <textarea id="action-${item.id}" placeholder="조치 내용을 입력하세요"></textarea>
      </div>
    `;
    el.appendChild(div);
  });
}

// ── 예/아니오 선택 ──
function setYN(id, isYes) {
  document.getElementById(`yes-${id}`).classList.toggle('active', isYes);
  document.getElementById(`no-${id}`).classList.toggle('active', !isYes);
  document.getElementById(`item-${id}`).classList.toggle('has-alert', !isYes);
  document.getElementById(`alert-${id}`).style.display = isYes ? 'none' : 'block';
}

// ── Firebase 저장 ──
async function saveRecord() {
  const date      = document.getElementById('date').value;
  const inspector = document.getElementById('inspector').value;
  const confirmer = document.getElementById('confirmer').value;

  if (!date)      { showToast('점검일자를 입력하세요.', 'error'); return; }
  if (!inspector) { showToast('점검자를 선택하세요.', 'error'); return; }
  if (!confirmer) { showToast('확인자를 선택하세요.', 'error'); return; }

  // 점검 결과 수집
  const getResults = (items) => {
    const result = {};
    items.forEach(item => {
      const yesBtn = document.getElementById(`yes-${item.id}`);
      const noBtn  = document.getElementById(`no-${item.id}`);
      let value = null;
      if (yesBtn && yesBtn.classList.contains('active')) value = true;
      if (noBtn  && noBtn.classList.contains('active'))  value = false;
      result[item.id] = { text: item.text, value, action: '' };
      if (value === false) {
        const actionEl = document.getElementById(`action-${item.id}`);
        if (actionEl) result[item.id].action = actionEl.value.trim();
      }
      // 추가 입력값
      if (item.extra) {
        if (item.extra.type === 'number') {
          const el = document.getElementById(item.extra.id);
          if (el) result[item.id][item.extra.id] = el.value ? parseFloat(el.value) : null;
        } else if (item.extra.type === 'temps') {
          item.extra.fields.forEach(f => {
            const el = document.getElementById(f.id);
            if (el) result[item.id][f.id] = el.value ? parseFloat(el.value) : null;
          });
        }
      }
    });
    return result;
  };

  const periodItems = {
    daily:     [...ITEMS.before, ...ITEMS.during, ...ITEMS.after],
    weekly:    ITEMS.weekly,
    monthly:   ITEMS.monthly,
    quarterly: ITEMS.quarterly,
    annual:    ITEMS.annual,
  };

  const checks = getResults(periodItems[currentPeriod]);
  const hasAlert = Object.values(checks).some(c => c.value === false);

  const payload = {
    meta: {
      date, inspector, confirmer,
      period: currentPeriod,
      created_at: Date.now(),
      reviewed: false, reviewed_at: null
    },
    checks,
    notes: document.getElementById('notes').value.trim(),
    has_alert: hasAlert
  };

  const [year, month] = date.split('-');
  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.textContent = '저장 중...';

  try {
    const res = await fetch(
      `${FIREBASE_URL}/hygiene_logs/${currentPeriod}/${year}/${month}.json`,
      { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    showToast('저장 완료! ✓', 'success');
  } catch(e) {
    console.error(e);
    showToast('저장 실패 — 네트워크를 확인하세요.', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '저 장 하 기';
  }
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => { t.className = 'toast'; }, 3000);
}

// ── 초기 렌더링 ──
renderList('list-before',    ITEMS.before);
renderList('list-during',    ITEMS.during);
renderList('list-after',     ITEMS.after);
renderList('list-weekly',    ITEMS.weekly);
renderList('list-monthly',   ITEMS.monthly);
renderList('list-quarterly', ITEMS.quarterly);
renderList('list-annual',    ITEMS.annual);
</script>
</body>
</html>
